name: Update Antibody Data

on:
  # Runs automatically on the 1st and 15th of every month at 6:00 AM UTC
  schedule:
    - cron: '0 6 1,15 * *'

  # Also allows you to trigger the update manually from GitHub's Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit and push updated JSON files

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run data update pipeline
        run: python scripts/update_all.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No data changes detected — skipping commit."
          else
            git commit -m "chore: auto-update antibody data [$(date -u '+%Y-%m-%d')]"
            git push
          fi
